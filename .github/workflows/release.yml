name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      pre-release:
        description: 'Pre-release version (e.g., alpha, beta, rc)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Get version
        id: get-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package extension
        run: npm run package

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix-package
          path: '*.vsix'
          retention-days: 7

  publish-openvsx:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-package

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm ci

      - name: Publish to Open VSX Registry
        run: npx ovsx publish *.vsix --pat "${{ secrets.OVSX_PAT }}"

  publish-marketplace:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-package

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm ci

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish *.vsix --pat "${{ secrets.VSCE_PAT }}" --skip-duplicate

  create-release:
    needs: [build, publish-marketplace, publish-openvsx]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
