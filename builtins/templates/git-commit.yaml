id: "pbp.git.commit.001"
name: "Git Commit Message"
description: "Generate semantic commit messages from code changes"
category: "Development"
tags: ["git", "commit", "semantic"]
author: "PbP Team"
version: "1.0.0"

parameters:
  model: "claude-3-5-haiku-20241022"
  temperature: 0.3
  max_tokens: 500

template: |
  Generate a semantic commit message for the following changes.
  
  {{#if git_commit_diff}}
  Git Diff:
  ```
  {{git_commit_diff}}
  ```
  {{/if}}
  
  {{#if selection}}
  Changed code:
  ```{{lang}}
  {{selection}}
  ```
  {{/if}}
  
  File: `{{filepath}}`
  
  Generate a commit message following the Conventional Commits specification:
  - Use format: `type(scope): description`
  - Types: feat, fix, docs, style, refactor, test, chore
  - Keep the subject line under 72 characters
  - Add a body if the change is complex
  
  Output only the commit message, nothing else.